apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: "6.x"
    helm:
      values: |
        initContainers:
          - name: velero-plugin-for-csi
            image: velero/velero-plugin-for-csi:v0.7.0
            volumeMounts:
              - mountPath: /target
                name: plugins
        configuration:
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: velero-backup
              config:
                region: minio
                s3ForcePathStyle: "true"
                s3Url: http://rook-ceph-rgw.rook-ceph.svc.cluster.local
        credentials:
          useSecret: true
          secretContents:
            cloud: |
              [default]
              aws_access_key_id=velero
              aws_secret_access_key=velero123
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
