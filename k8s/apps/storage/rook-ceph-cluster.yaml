python3 - << 'PYEOF'
content = """apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rook-ceph-cluster
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://charts.rook.io/release
    chart: rook-ceph-cluster
    targetRevision: v1.14.0
    helm:
      values: |
        operatorNamespace: rook-ceph
        cephClusterSpec:
          mon:
            count: 1
            allowMultiplePerNode: false
          mgr:
            count: 1
          dashboard:
            enabled: true
          storage:
            useAllNodes: false
            useAllDevices: false
            nodes:
              - name: k8s-worker1
                devices:
                  - name: sdb
              - name: k8s-worker2
                devices:
                  - name: sdb
        cephBlockPools:
          - name: ceph-blockpool
            spec:
              failureDomain: host
              replicated:
                size: 2
            storageClass:
              enabled: true
              name: rook-ceph-block
              isDefault: true
              reclaimPolicy: Delete
              allowVolumeExpansion: true
        cephFileSystems: []
        cephObjectStores: []
  destination:
    server: https://kubernetes.default.svc
    namespace: rook-ceph
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
"""
with open('/home/mila/k8s-proxmox-lab/k8s/apps/storage/rook-ceph-cluster.yaml', 'w') as f:
    f.write(content)
print("OK")
PYEOF