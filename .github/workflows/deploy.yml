pour eviter erreur indentation donne moi le fochier modifie complet  name: DevSecOps Pipeline
on:
push:
branches: [main]
pull_request:
branches: [main]
env:
TF_VERSION: "1.7.0"
ANSIBLE_HOST_KEY_CHECKING: "False"
jobs:
security-scan:
name: Security Scan
runs-on: ubuntu-latest
steps:
      - name: Checkout
uses: actions/checkout@v4
      - name: Checkov IaC Scan
uses: bridgecrewio/checkov-action@master
with:
directory: infra/
framework: terraform
soft_fail: true
      - name: Trivy filesystem scan
uses: aquasecurity/trivy-action@master
with:
scan-type: fs
scan-ref: .
severity: CRITICAL,HIGH
exit-code: 0
terraform:
name: Terraform
runs-on: ubuntu-latest
needs: security-scan
if: github.ref == 'refs/heads/main'
steps:
      - name: Checkout
uses: actions/checkout@v4
      - name: Setup Terraform
uses: hashicorp/setup-terraform@v3
with:
terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
working-directory: infra/
env:
TF_VAR_proxmox_api_url: ${{ secrets.PROXMOX_API_URL }}
TF_VAR_proxmox_token_id: ${{ secrets.PROXMOX_TOKEN_ID }}
TF_VAR_proxmox_token_secret: ${{ secrets.PROXMOX_TOKEN_SECRET }}
run: terraform init
      - name: Terraform Validate
working-directory: infra/
run: terraform validate
      - name: Terraform Plan
working-directory: infra/
env:
TF_VAR_proxmox_api_url: ${{ secrets.PROXMOX_API_URL }}
TF_VAR_proxmox_token_id: ${{ secrets.PROXMOX_TOKEN_ID }}
TF_VAR_proxmox_token_secret: ${{ secrets.PROXMOX_TOKEN_SECRET }}
run: terraform plan -out=tfplan
      - name: Terraform Apply
working-directory: infra/
env:
TF_VAR_proxmox_api_url: ${{ secrets.PROXMOX_API_URL }}
TF_VAR_proxmox_token_id: ${{ secrets.PROXMOX_TOKEN_ID }}
TF_VAR_proxmox_token_secret: ${{ secrets.PROXMOX_TOKEN_SECRET }}
run: terraform apply -auto-approve tfplan
ansible:
name: Ansible Bootstrap
runs-on: ubuntu-latest
needs: terraform
steps:
      - name: Checkout
uses: actions/checkout@v4
      - name: Setup SSH Key
run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.K8S_MASTER_IP }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.K8S_WORKER1_IP }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.K8S_WORKER2_IP }} >> ~/.ssh/known_hosts
      - name: Install Ansible
run: |
          pip install ansible
      - name: Run Ansible Playbook
working-directory: ansible/
run: |
          ansible-playbook -i inventory.ini site.yml
argocd-sync:
name: ArgoCD Sync
runs-on: ubuntu-latest
needs: ansible
steps:
      - name: Checkout
uses: actions/checkout@v4
      - name: Install ArgoCD CLI
run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/
      - name: ArgoCD Login
run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --username admin \
            --password ${{ secrets.ARGOCD_PASSWORD }} \
            --insecure
      - name: Apply App of Apps
run: |
          kubectl apply -f k8s/base/app-of-apps.yaml
      - name: ArgoCD Sync
run: |
          argocd app sync app-of-apps --async
          argocd app wait app-of-apps --timeout 300
