---
- name: Vérifier si cluster déjà initialisé
  stat:
    path: /etc/kubernetes/admin.conf
  register: k8s_init
  tags: master

- name: Initialiser le cluster Kubernetes
  command: >
    kubeadm init
    --pod-network-cidr=10.244.0.0/16
    --apiserver-advertise-address=192.168.192.50
  when: not k8s_init.stat.exists
  tags: master

- name: Créer dossier .kube
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
  tags: master

- name: Copier kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    owner: ubuntu
    group: ubuntu
    mode: '0600'
    remote_src: yes
  tags: master

- name: Installer Calico CNI
  become_user: ubuntu
  command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  tags: master

- name: Attendre que le master soit Ready
  become_user: ubuntu
  command: kubectl wait --for=condition=Ready node/k8s-master --timeout=180s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  tags: master

- name: Installer NGINX Ingress Controller
  become_user: ubuntu
  command: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  tags: ingress

- name: Attendre Ingress Controller Ready
  become_user: ubuntu
  command: >
    kubectl wait --namespace ingress-nginx
    --for=condition=ready pod
    --selector=app.kubernetes.io/component=controller
    --timeout=120s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  tags: ingress

- name: Générer la commande join
  command: kubeadm token create --print-join-command
  register: join_command_raw
  tags: master

- name: Stocker join command comme fact global
  set_fact:
    join_command: "{{ join_command_raw.stdout }}"
    cacheable: yes
  tags: master

- name: Copier les manifestes K8s
  copy:
    src: "{{ playbook_dir }}/k8s-manifests/"
    dest: /home/ubuntu/k8s-manifests/
    owner: ubuntu
    group: ubuntu
  tags: deploy

- name: Déployer l'application
  become_user: ubuntu
  command: kubectl apply -f /home/ubuntu/k8s-manifests/
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  tags: deploy
