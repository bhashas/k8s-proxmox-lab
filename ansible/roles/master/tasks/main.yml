---
- name: Vérifier si cluster déjà initialisé
  stat:
    path: /etc/kubernetes/admin.conf
  register: k8s_init
  tags: master

- name: Initialiser le cluster Kubernetes pour Cilium
  command: >
    kubeadm init
    --pod-network-cidr=10.244.0.0/16
    --apiserver-advertise-address={{ ansible_host }}
    --skip-phases=addon/kube-proxy
  when: not k8s_init.stat.exists
  tags: master

- name: Créer dossier .kube
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
  tags: master

- name: Copier kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    owner: ubuntu
    group: ubuntu
    mode: '0600'
    remote_src: yes
  tags: master

- name: Installer Helm
  shell: |
    curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm
  tags: master

- name: Ajouter repo Helm Cilium
  become_user: ubuntu
  command: helm repo add cilium https://helm.cilium.io/
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  ignore_errors: yes
  tags: master

- name: Installer Cilium via Helm
  become_user: ubuntu
  command: >
    helm upgrade --install cilium cilium/cilium
    --version 1.15.5
    --namespace kube-system
    --set kubeProxyReplacement=true
    --set k8sServiceHost={{ ansible_host }}
    --set k8sServicePort=6443
    --set hubble.relay.enabled=true
    --set hubble.ui.enabled=true
    --set gatewayAPI.enabled=true
    --set l2announcements.enabled=true
    --set externalIPs.enabled=true
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  tags: master

- name: Attendre que Cilium soit Ready
  become_user: ubuntu
  command: >
    kubectl wait --for=condition=Ready pod
    -l app.kubernetes.io/name=cilium-agent
    -n kube-system
    --timeout=300s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  tags: master

- name: Attendre que le master soit Ready
  become_user: ubuntu
  command: kubectl wait --for=condition=Ready node/k8s-master --timeout=180s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  tags: master

- name: Installer Gateway API CRDs
  become_user: ubuntu
  command: kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.1.0/standard-install.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  tags: master

- name: Appliquer namespace ArgoCD
  become_user: ubuntu
  shell: kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  tags: master

- name: Installer ArgoCD
  become_user: ubuntu
  command: >
    kubectl apply -n argocd
    --server-side
    --force-conflicts
    -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  tags: master

- name: Générer la commande join
  command: kubeadm token create --print-join-command
  register: join_command_raw
  tags: master

- name: Stocker join command comme fait global
  set_fact:
    join_command: "{{ join_command_raw.stdout }}"
    cacheable: yes
  tags: master