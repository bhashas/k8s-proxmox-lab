---
- name: Attendre fin de cloud-init
  command: cloud-init status --wait
  changed_when: false
  failed_when: false
  tags: always

- name: Mise à jour système
  apt:
    update_cache: yes
    upgrade: dist
  tags: common

- name: Désactiver swap (immédiat)
  command: swapoff -a
  changed_when: false
  tags: common

- name: Désactiver swap (permanent)
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '# \1'
  tags: common

- name: Charger modules réseau (persistant)
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
  tags: common

- name: Charger modules réseau (immédiat)
  modprobe:
    name: "{{ item }}"
  loop:
    - overlay
    - br_netfilter
  tags: common

- name: Paramètres sysctl
  copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
  tags: common

- name: Appliquer sysctl
  command: sysctl --system
  changed_when: false
  tags: common
