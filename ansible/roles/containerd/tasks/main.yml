---
- name: Installer containerd
  apt:
    name: containerd
    state: present
    update_cache: yes
  tags: containerd

- name: Créer dossier de config
  file:
    path: /etc/containerd
    state: directory
  tags: containerd

- name: Générer config par défaut
  shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml
  tags: containerd

- name: Activer SystemdCgroup
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: restart containerd
  tags: containerd

- name: Activer et démarrer containerd
  systemd:
    name: containerd
    enabled: yes
    state: started
  tags: containerd
